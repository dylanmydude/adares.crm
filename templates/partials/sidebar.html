<aside class="sidebar">
    <a class="brand-mark" href="{% url 'dashboard' %}" aria-label="ADARES CRM dashboard">
        <span class="brand-symbol">A</span>
        <span>
            <strong>ADARES</strong>
            <small>CRM</small>
        </span>
    </a>

    <nav class="sidebar-nav" aria-label="Main navigation">
        <a class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
        <a class="{% if request.resolver_match.url_name in 'income_list income_create income_edit' %}active{% endif %}" href="{% url 'income_list' %}"><i class="bi bi-cash-stack"></i> Income</a>
        <a class="{% if request.resolver_match.url_name in 'expense_list expense_create expense_edit' %}active{% endif %}" href="{% url 'expense_list' %}"><i class="bi bi-receipt"></i> Expenses</a>
        <a class="{% if request.resolver_match.url_name in 'client_list client_create client_edit' %}active{% endif %}" href="{% url 'client_list' %}"><i class="bi bi-people"></i> Clients</a>
        <a class="{% if request.resolver_match.url_name in 'job_list job_create job_edit' %}active{% endif %}" href="{% url 'job_list' %}"><i class="bi bi-briefcase"></i> Jobs</a>
        <a class="{% if request.resolver_match.url_name in 'invoice_list invoice_create invoice_detail invoice_edit' %}active{% endif %}" href="{% url 'invoice_list' %}"><i class="bi bi-file-earmark-text"></i> Invoices</a>
        <a class="{% if request.resolver_match.url_name == 'tax_summary' %}active{% endif %}" href="{% url 'tax_summary' %}"><i class="bi bi-calculator"></i> Tax</a>
        <a class="{% if request.resolver_match.url_name in 'report_list report_generate report_download' %}active{% endif %}" href="{% url 'report_list' %}"><i class="bi bi-filetype-pdf"></i> Reports</a>
        <a href="#"><i class="bi bi-cloud-arrow-down"></i> Backup</a>
        <a href="#"><i class="bi bi-bell"></i> Notifications</a>
        {% if request.user.is_authenticated %}
            <a href="{% url 'profile' %}"><i class="bi bi-person-circle"></i> Profile</a>
            <a href="#"><i class="bi bi-gear"></i> Settings</a>
            <a href="{% url 'logout' %}"><i class="bi bi-box-arrow-right"></i> Logout</a>
        {% else %}
            <a href="{% url 'login' %}"><i class="bi bi-box-arrow-in-right"></i> Login</a>
            <a href="{% url 'register' %}"><i class="bi bi-person-plus"></i> Register</a>
        {% endif %}
    </nav>
</aside>
