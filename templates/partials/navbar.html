<header class="top-navbar">
    <div>
        <p class="eyebrow mb-1">Gig worker finance workspace</p>
        <h1 class="page-title mb-0">{% block page_heading %}Dashboard{% endblock %}</h1>
    </div>
    <div class="navbar-actions">
        {% if request.user.is_authenticated %}
            <a class="btn btn-outline-light btn-sm" href="{% url 'profile' %}">
                <i class="bi bi-person-circle"></i>
                <span>Profile</span>
            </a>
            <a class="btn btn-primary btn-sm" href="{% url 'logout' %}">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </a>
        {% else %}
            <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">
                <i class="bi bi-box-arrow-in-right"></i>
                <span>Login</span>
            </a>
            <a class="btn btn-primary btn-sm" href="{% url 'register' %}">
                <i class="bi bi-person-plus"></i>
                <span>Register</span>
            </a>
        {% endif %}
    </div>
</header>
